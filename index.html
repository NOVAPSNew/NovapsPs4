<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAPS</title>
    <style>
        :root {
            --ps-blue: #003791;
            --ps-dark: #0a0a0a;
            --ps-light: #e0e0e0;
            --ps-accent: #0072ce;
        }

        body {
            background-color: var(--ps-dark);
            color: var(--ps-light);
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { color: var(--ps-accent); margin: 10px 0; font-size: 2.5em; text-shadow: 0 0 10px rgba(0,114,206,0.5); }

        .controls {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
        }

        .ip-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ip-label { font-size: 12px; color: #888; text-align: left; margin-left: 5px; }

        input {
            background: #222;
            border: 1px solid var(--ps-blue);
            color: #00ff00;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
            text-align: center;
        }

        #search-input {
            color: white;
            border: 1px solid #444;
            text-align: left;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }

        .game-card:hover, .game-card:active { border-color: var(--ps-accent); transform: scale(1.02); }

        .game-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #222;
        }

        .game-info { padding: 10px; }
        .game-title { font-weight: bold; font-size: 13px; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .install-btn {
            background: var(--ps-blue);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 9999;
            border: 2px solid var(--ps-accent);
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            width: 80%;
            max-width: 400px;
        }

        .loading { font-size: 24px; margin: 60px; color: var(--ps-accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOVAPS</h1>
        <div class="controls">
            <div class="ip-container">
                <span class="ip-label">IP DE TU CONSOLA (RPI):</span>
                <input type="text" id="ip-input" placeholder="Detectando IP...">
            </div>
            <input type="text" id="search-input" placeholder="Buscar juego...">
        </div>
    </div>

    <div id="loading" class="loading">Cargando Catálogo...</div>
    <div id="game-grid" class="game-grid"></div>

    <div id="status-msg"></div>

    <script>
        const CATALOG_URL = 'https://raw.githubusercontent.com/NOVAPSNew/Ps4prueba01/main/GAMES.json';
        const PORT = '12801';
        let allGames = [];

        const gameGrid = document.getElementById('game-grid');
        const loading = document.getElementById('loading');
        const searchInput = document.getElementById('search-input');
        const ipInput = document.getElementById('ip-input');
        const statusMsg = document.getElementById('status-msg');

        // 1. DETECCIÓN DE IP AUTOMÁTICA
        function autoDetectIP() {
            // Intentar cargar IP guardada
            const savedIP = localStorage.getItem('ps4_ip');
            if (savedIP) ipInput.value = savedIP;

            window.RTCPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            if (!window.RTCPeerConnection) return;

            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (!e || !e.candidate) return;
                const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (match && !match[1].startsWith('127.')) {
                    if (!ipInput.value || ipInput.value.includes('Detectando')) {
                        ipInput.value = match[1];
                        localStorage.setItem('ps4_ip', match[1]);
                    }
                    pc.onicecandidate = null;
                }
            };
            setTimeout(() => {
                if(!ipInput.value) ipInput.value = "192.168.1.XXX";
            }, 3000);
        }

        ipInput.onchange = () => localStorage.setItem('ps4_ip', ipInput.value);

        // 2. CARGA DE CATÁLOGO
        async function loadCatalog() {
            try {
                const res = await fetch(CATALOG_URL + '?t=' + Date.now());
                const text = await res.text();

                // Intentar parsear normalmente, si falla intentar reparar
                let data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    const cleanText = text.substring(0, text.lastIndexOf('}') + 1);
                    data = JSON.parse(cleanText + (cleanText.endsWith('}}') ? '' : '}'));
                }

                const gamesData = data.DATA || {};
                allGames = Object.keys(gamesData).map(url => ({ url, ...gamesData[url] }));

                render(allGames);
                loading.style.display = 'none';
            } catch (e) {
                loading.innerHTML = "Error al cargar juegos.<br><small>Revisa tu conexión o el archivo JSON.</small>";
                console.error(e);
            }
        }

        function render(games) {
            gameGrid.innerHTML = '';
            games.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `
                    <img class="game-cover" src="${g.cover_url}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225?text=NO+IMAGE'">
                    <div class="game-info">
                        <div class="game-title">${g.name}</div>
                    </div>
                    <button class="install-btn">Instalar</button>
                `;
                div.onclick = () => install(gameGrid.contains(div) ? g : null);
                gameGrid.appendChild(div);
            });
        }

        // 3. ENVÍO DE COMANDO RPI (JSON POST)
        async function install(game) {
            if(!game) return;
            const ip = ipInput.value.trim();

            showStatus("<b>ENVIANDO A CONSOLA</b><br>" + game.name + "<br><br><i>Mira las notificaciones de tu PS4...</i>");

            const payload = JSON.stringify({
                type: "direct",
                packages: [game.url]
            });

            // Enviar a la IP configurada
            const sendRequest = (targetIP) => {
                fetch(`http://${targetIP}:${PORT}/api/install`, {
                    method: 'POST',
                    body: payload,
                    mode: 'no-cors' // EVITA BLOQUEOS DE SEGURIDAD
                }).catch(e => console.log("Fetch fire & forget"));
            };

            sendRequest(ip);

            // Si no estamos en la IP local, intentar también local por si acaso
            if(ip !== '127.0.0.1') sendRequest('127.0.0.1');

            setTimeout(() => {
                showStatus("<b>¡ORDEN PROCESADA!</b><br>Si no aparece la descarga, verifica que RPI esté abierto en la PS4 e intenta de nuevo.", "success");
                setTimeout(() => statusMsg.style.display = 'none', 5000);
            }, 2000);
        }

        function showStatus(html, type) {
            statusMsg.innerHTML = html;
            statusMsg.style.display = 'block';
            statusMsg.style.borderColor = type === 'success' ? '#00ff00' : '#0072ce';
        }

        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            render(allGames.filter(g => g.name.toLowerCase().includes(q)));
        };

        autoDetectIP();
        loadCatalog();
    </script>
</body>
</html>
