<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAPS</title>
    <style>
        :root {
            --ps-blue: #003791;
            --ps-dark: #0a0a0a;
            --ps-light: #e0e0e0;
            --ps-accent: #0072ce;
        }

        body {
            background-color: var(--ps-dark);
            color: var(--ps-light);
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { 
            color: var(--ps-accent); 
            margin: 10px 0; 
            font-size: 2.5em; 
            text-shadow: 0 0 10px rgba(0,114,206,0.5); 
        }

        .controls {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
            margin: 0 auto;
            max-width: 500px;
        }

        .ip-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ip-label { font-size: 12px; color: #888; text-align: left; margin-left: 5px; }

        input {
            background: #222;
            border: 1px solid var(--ps-blue);
            color: #00ff00;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
            text-align: center;
        }

        #search-input {
            color: white;
            border: 1px solid #444;
            text-align: left;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-card:hover, .game-card:active { 
            border-color: var(--ps-accent); 
            transform: scale(1.02); 
        }

        .game-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #222;
        }

        .game-info { padding: 10px; flex-grow: 1; }
        .game-title { 
            font-weight: bold; 
            font-size: 13px; 
            height: 34px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
        }

        .install-btn {
            background: var(--ps-blue);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .install-btn:hover { background: var(--ps-accent); }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 9999;
            border: 2px solid var(--ps-accent);
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            width: 80%;
            max-width: 400px;
            color: white;
        }

        .loading { font-size: 24px; margin: 60px; color: var(--ps-accent); text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOVAPS</h1>
        <div class="controls">
            <div class="ip-container">
                <span class="ip-label">IP DE TU CONSOLA (RPI):</span>
                <input type="text" id="ip-input" placeholder="Buscando consola...">
            </div>
            <input type="text" id="search-input" placeholder="Buscar juego...">
        </div>
    </div>

    <div id="loading" class="loading">Cargando Catálogo...</div>
    <div id="game-grid" class="game-grid"></div>

    <div id="status-msg"></div>

    <script>
        const CATALOG_URL = 'https://raw.githubusercontent.com/NOVAPSNew/Ps4prueba01/refs/heads/main/GAMES.json';
        const PORT = '12801';
        let allGames = [];
        let isScanning = false;

        const gameGrid = document.getElementById('game-grid');
        const loading = document.getElementById('loading');
        const searchInput = document.getElementById('search-input');
        const ipInput = document.getElementById('ip-input');
        const statusMsg = document.getElementById('status-msg');

        // 1. CARGA DE CATÁLOGO ADAPTADA A TU FORMATO OBJETO DE URLS
        async function loadCatalog() {
            try {
                const res = await fetch(CATALOG_URL + '?t=' + Date.now());
                
                if (!res.ok) {
                    throw new Error(`HTTP Error ${res.status}: No se encuentra el archivo en GitHub.`);
                }
                
                const data = await res.json();
                let baseData = data.DATA || data.games || data;

                allGames = Object.keys(baseData).map(pkgUrl => {
                    const item = baseData[pkgUrl];
                    
                    if (!item || typeof item !== 'object' || !pkgUrl.startsWith('http')) return null;

                    return {
                        name: item.name || "Juego sin nombre",
                        cover_url: item.cover_url || item.image || "",
                        url: pkgUrl.trim() 
                    };
                }).filter(g => g !== null && g.url !== "");

                if (allGames.length === 0) {
                    loading.innerHTML = "Error: La estructura del JSON cambió o no contiene URLs válidas como llaves.";
                    return;
                }

                render(allGames);
                loading.style.display = 'none';
            } catch (e) {
                console.error("Detalles del error de carga:", e);
                loading.innerHTML = `<b>Error al procesar el catálogo:</b><br><span style="font-size:14px; color:#ff4444;">${e.message}</span>`;
            }
        }

        function render(games) {
            gameGrid.innerHTML = '';
            games.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `
                    <img class="game-cover" src="${g.cover_url}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225?text=NO+IMAGE'">
                    <div class="game-info">
                        <div class="game-title">${g.name}</div>
                    </div>
                    <button class="install-btn">Instalar</button>
                `;
                
                div.querySelector('.install-btn').onclick = (e) => {
                    e.stopPropagation();
                    install(g);
                };
                gameGrid.appendChild(div);
            });
        }

        // 2. DETECCIÓN Y ESCANEO DE IP
        async function initIP() {
            const savedIP = localStorage.getItem('ps4_ip');
            if (savedIP) {
                ipInput.value = savedIP;
                if (await checkIP(savedIP)) return;
            }
            detectSubnetAndScan();
        }

        async function checkIP(ip) {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 600);
                
                await fetch(`http://${ip}:${PORT}/api/is_exists`, {
                    method: 'POST',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                return true; 
            } catch (e) {
                return false;
            }
        }

        function detectSubnetAndScan() {
            if (isScanning) return;
            isScanning = true;

            window.RTCPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            if (!window.RTCPeerConnection) {
                ipInput.placeholder = "Digita tu IP manualmente";
                isScanning = false;
                return;
            }

            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = async (e) => {
                if (!e || !e.candidate) return;
                const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (match && !match[1].startsWith('127.')) {
                    pc.onicecandidate = null;
                    const myIP = match[1];
                    const subnet = myIP.substring(0, myIP.lastIndexOf('.') + 1);
                    scanSubnet(subnet);
                }
            };
            
            setTimeout(() => {
                if(ipInput.value === "" && ipInput.placeholder.includes("Buscando")) {
                    ipInput.placeholder = "Digita tu IP manualmente";
                    isScanning = false;
                }
            }, 5000);
        }

        async function scanSubnet(subnet) {
            ipInput.placeholder = "Buscando en " + subnet + "X...";
            for (let i = 1; i < 255; i += 25) {
                const tasks = [];
                for (let j = i; j < i + 25 && j < 255; j++) {
                    const ip = subnet + j;
                    tasks.push(checkIP(ip).then(found => found ? ip : null));
                }
                const results = await Promise.all(tasks);
                const foundIP = results.find(ip => ip !== null);
                if (foundIP) {
                    ipInput.value = foundIP;
                    localStorage.setItem('ps4_ip', foundIP);
                    showStatus("¡Consola Detectada en " + foundIP + "!", "success");
                    setTimeout(() => statusMsg.style.display = 'none', 3000);
                    isScanning = false;
                    return;
                }
            }
            ipInput.placeholder = "Digita tu IP manualmente";
            isScanning = false;
        }

        // 3. ENVÍO DE COMANDO RPI (CORREGIDO PARA PASAR HTTPS A HTTP SIEMPRE)
        async function install(game) {
            const ip = ipInput.value.trim();
            if (!ip || ip.includes('X') || ip === "") {
                showStatus("Error: Por favor introduce la IP de tu consola", "error");
                return;
            }

            if (!game.url) {
                showStatus("Error: Este juego no contiene un enlace válido", "error");
                return;
            }

            // REGLA CRÍTICA: Reemplaza obligatoriamente https:// por http:// para evitar fallos en la consola
            const pkgUrl = game.url.replace(/^https:\/\//i, 'http://');
            
            showStatus("<b>ENVIANDO A CONSOLA...</b><br>" + game.name);

            const payload = JSON.stringify({
                type: "direct",
                packages: [pkgUrl]
            });

            try {
                await fetch(`http://${ip}:${PORT}/api/install`, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: payload
                });

                showStatus("<b>¡ORDEN ENVIADA!</b><br>Verifica las notificaciones en tu consola.", "success");
                setTimeout(() => statusMsg.style.display = 'none', 5000);
            } catch (e) {
                showStatus("Error al comunicar con la consola.", "error");
            }
        }

        function showStatus(html, type) {
            statusMsg.innerHTML = html;
            statusMsg.style.display = 'block';
            statusMsg.style.borderColor = type === 'success' ? '#00ff00' : (type === 'error' ? '#ff0000' : '#0072ce');
        }

        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            render(allGames.filter(g => g.name.toLowerCase().includes(q)));
        };

        ipInput.onchange = () => localStorage.setItem('ps4_ip', ipInput.value);

        initIP();
        loadCatalog();
    </script>
</body>
</html>
