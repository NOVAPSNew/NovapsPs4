<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAPS</title>
    <style>
        :root {
            --ps-blue: #003791;
            --ps-dark: #0a0a0a;
            --ps-light: #e0e0e0;
            --ps-accent: #0072ce;
        }

        body {
            background-color: var(--ps-dark);
            color: var(--ps-light);
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { color: var(--ps-accent); margin: 10px 0; font-size: 2.5em; }

        .controls {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ip-box {
            background: #222;
            padding: 8px;
            border: 1px solid var(--ps-blue);
            border-radius: 5px;
            color: #00ff00;
            font-weight: bold;
            text-align: center;
        }

        input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .game-card:active { border-color: var(--ps-accent); }

        .game-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #222;
        }

        .game-info { padding: 8px; flex-grow: 1; }
        .game-title { font-weight: bold; font-size: 13px; height: 34px; overflow: hidden; }

        .install-btn {
            background: var(--ps-blue);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        #status-msg {
            position: fixed;
            top: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 5px;
            display: none;
            z-index: 9999;
            border: 1px solid var(--ps-accent);
        }

        .loading { font-size: 24px; margin: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOVAPS</h1>
        <div class="controls">
            <div id="ip-display" class="ip-box">Detectando IP de PS4...</div>
            <input type="text" id="search-input" placeholder="Buscar juego...">
        </div>
    </div>

    <div id="loading" class="loading">Cargando...</div>
    <div id="game-grid" class="game-grid"></div>
    <div id="status-msg"></div>

    <script>
        const CATALOG_URL = 'https://raw.githubusercontent.com/NOVAPSNew/Ps4prueba01/main/GAMES.json';
        const PORT = '12801';
        let allGames = [];
        let detectedIP = '127.0.0.1';

        const gameGrid = document.getElementById('game-grid');
        const loading = document.getElementById('loading');
        const searchInput = document.getElementById('search-input');
        const ipDisplay = document.getElementById('ip-display');
        const statusMsg = document.getElementById('status-msg');

        // 1. DETECCIÓN DE IP REAL (WebRTC) - Rápida y sin bloqueos
        function autoDetectIP() {
            window.RTCPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            if (!window.RTCPeerConnection) {
                ipDisplay.textContent = "IP: 127.0.0.1 (Local)";
                return;
            }

            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (!e || !e.candidate) return;
                const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (match && !match[1].startsWith('127.')) {
                    detectedIP = match[1];
                    ipDisplay.textContent = "IP PS4: " + detectedIP;
                    pc.onicecandidate = null;
                }
            };
            // Timeout por si falla
            setTimeout(() => { if(detectedIP === '127.0.0.1') ipDisplay.textContent = "IP PS4: 127.0.0.1"; }, 3000);
        }

        // 2. CARGA DE CATÁLOGO OPTIMIZADA
        async function loadCatalog() {
            try {
                const res = await fetch(CATALOG_URL);
                const text = await res.text();
                // Limpieza básica por si el JSON está mal cerrado
                const cleanText = text.substring(0, text.lastIndexOf('}') + 1);
                const data = JSON.parse(cleanText + '}');

                const gamesData = data.DATA || {};
                allGames = Object.keys(gamesData).map(url => ({ url, ...gamesData[url] }));

                render(allGames);
                loading.style.display = 'none';
            } catch (e) {
                loading.textContent = "Error al cargar juegos.";
                console.error(e);
            }
        }

        function render(games) {
            gameGrid.innerHTML = '';
            games.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `
                    <img class="game-cover" src="${g.cover_url}" loading="lazy">
                    <div class="game-info">
                        <div class="game-title">${g.name}</div>
                    </div>
                    <button class="install-btn">INSTALAR</button>
                `;
                div.onclick = () => install(g);
                gameGrid.appendChild(div);
            });
        }

        // 3. ENVÍO DIRECTO (Prueba ambas: Local e IP detectada)
        async function install(game) {
            showStatus("Enviando: " + game.name);
            const payload = JSON.stringify({ type: 'direct', packages: [game.url] });

            // Intentamos enviar a la IP detectada
            try {
                fetch(`http://${detectedIP}:${PORT}/api/install`, { method: 'POST', body: payload });
                // También enviamos a 127.0.0.1 por si acaso
                if (detectedIP !== '127.0.0.1') {
                    fetch(`http://127.0.0.1:${PORT}/api/install`, { method: 'POST', body: payload });
                }
                showStatus("¡ORDEN ENVIADA! Mira las notificaciones de tu PS4", "success");
            } catch (e) {
                showStatus("Error al conectar con la consola", "error");
            }
        }

        function showStatus(m, type) {
            statusMsg.textContent = m;
            statusMsg.style.display = 'block';
            statusMsg.style.borderColor = type === 'success' ? '#00ff00' : '#0072ce';
            setTimeout(() => statusMsg.style.display = 'none', 4000);
        }

        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            render(allGames.filter(g => g.name.toLowerCase().includes(q)));
        };

        autoDetectIP();
        loadCatalog();
    </script>
</body>
</html>
