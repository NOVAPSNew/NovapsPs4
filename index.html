<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAPS - Consola Mode</title>
    <style>
        :root {
            --ps-blue: #003791;
            --ps-dark: #0a0a0a;
            --ps-light: #e0e0e0;
            --ps-accent: #0072ce;
        }

        body {
            background-color: var(--ps-dark);
            color: var(--ps-light);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { 
            color: var(--ps-accent); 
            margin: 10px 0; 
            font-size: 2.5em; 
            text-shadow: 0 0 10px rgba(0,114,206,0.5); 
        }

        .controls {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            width: 95%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
            margin: 0 auto;
            max-width: 500px;
        }

        .ip-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ip-label { font-size: 12px; color: #888; text-align: left; margin-left: 5px; }

        input {
            background: #222;
            border: 1px solid var(--ps-blue);
            color: #00ff00;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
            text-align: center;
        }

        #search-input {
            color: white;
            border: 1px solid #444;
            text-align: left;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-card:hover, .game-card:active { 
            border-color: var(--ps-accent); 
        }

        .game-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #222;
        }

        .game-info { padding: 10px; flex-grow: 1; }
        .game-title { 
            font-weight: bold; 
            font-size: 14px; 
            height: 38px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
        }

        .install-btn {
            background: var(--ps-blue);
            color: white;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            font-size: 14px;
        }

        .install-btn:style { background: var(--ps-accent); }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 9999;
            border: 2px solid var(--ps-accent);
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            width: 85%;
            max-width: 400px;
            color: white;
            font-size: 16px;
        }

        .loading { font-size: 24px; margin: 60px; color: var(--ps-accent); text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOVAPS</h1>
        <div class="controls">
            <div class="ip-container">
                <span class="ip-label">DIRECCIÓN LOCAL DE LA CONSOLA:</span>
                <input type="text" id="ip-input" value="127.0.0.1">
            </div>
            <input type="text" id="search-input" placeholder="Buscar juego...">
        </div>
    </div>

    <div id="loading" class="loading">Cargando Catálogo...</div>
    <div id="game-grid" class="game-grid"></div>

    <div id="status-msg"></div>

    <script>
        const CATALOG_URL = 'https://raw.githubusercontent.com/NOVAPSNew/Ps4prueba01/refs/heads/main/GAMES.json';
        const PORT = '12801';
        let allGames = [];

        const gameGrid = document.getElementById('game-grid');
        const loading = document.getElementById('loading');
        const searchInput = document.getElementById('search-input');
        const ipInput = document.getElementById('ip-input');
        const statusMsg = document.getElementById('status-msg');

        // 1. CARGAR EL CATÁLOGO DESDE TU OBJETO DE REPOSITORIO
        async function loadCatalog() {
            try {
                const res = await fetch(CATALOG_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error(`Error ${res.status}`);
                
                const data = await res.json();
                let baseData = data.DATA || data.games || data;

                allGames = Object.keys(baseData).map(pkgUrl => {
                    const item = baseData[pkgUrl];
                    if (!item || typeof item !== 'object' || !pkgUrl.startsWith('http')) return null;

                    return {
                        name: item.name || "Juego sin nombre",
                        cover_url: item.cover_url || item.image || "",
                        url: pkgUrl.trim() 
                    };
                }).filter(g => g !== null && g.url !== "");

                if (allGames.length === 0) {
                    loading.innerHTML = "No se encontraron juegos válidos.";
                    return;
                }

                render(allGames);
                loading.style.display = 'none';
            } catch (e) {
                console.error(e);
                loading.innerHTML = "Error al descargar el catálogo.";
            }
        }

        function render(games) {
            gameGrid.innerHTML = '';
            games.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `
                    <img class="game-cover" src="${g.cover_url}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225?text=NO+IMAGE'">
                    <div class="game-info">
                        <div class="game-title">${g.name}</div>
                    </div>
                    <button class="install-btn">Descargar</button>
                `;
                
                div.querySelector('.install-btn').onclick = (e) => {
                    e.stopPropagation();
                    install(g);
                };
                gameGrid.appendChild(div);
            });
        }

        // 2. ENVIAR LA ORDEN A SÍ MISMA (127.0.0.1)
        async function install(game) {
            const ip = ipInput.value.trim();
            
            if (!game.url) {
                showStatus("Error: El juego no tiene link de descarga.", "error");
                return;
            }

            // Cambiar https a http obligatorio
            const pkgUrl = game.url.replace(/^https:\/\//i, 'http://');
            
            showStatus("<b>ENVIANDO DESCARGA...</b><br>" + game.name);

            const payload = JSON.stringify({
                type: "direct",
                packages: [pkgUrl]
            });

            try {
                // Al estar en el navegador de la PS4, enviamos el POST a 127.0.0.1:12801
                await fetch(`http://${ip}:${PORT}/api/install`, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: payload
                });

                // Como usamos 'no-cors', no sabemos la respuesta exacta, pero si no salta al catch
                // significa que los bytes salieron hacia el puerto local de instalación.
                showStatus("<b>¡DESCARGA SOLICITADA!</b><br>Sal al menú y revisa tus Notificaciones / Descargas.", "success");
                setTimeout(() => statusMsg.style.display = 'none', 6000);
            } catch (e) {
                showStatus("Error de comunicación. Asegúrate de tener el Remote Package Installer abierto en segundo plano.", "error");
            }
        }

        function showStatus(html, type) {
            statusMsg.innerHTML = html;
            statusMsg.style.display = 'block';
            statusMsg.style.borderColor = type === 'success' ? '#00ff00' : (type === 'error' ? '#ff0000' : '#0072ce');
        }

        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            render(allGames.filter(g => g.name.toLowerCase().includes(q)));
        };

        loadCatalog();
    </script>
</body>
</html>
